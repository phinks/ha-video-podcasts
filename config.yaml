name: "Video Podcasts"
version: "1.0.0"
slug: "video_podcasts"
description: >
  Aggregates video podcast RSS feeds and plays episodes on HA media player devices.
arch:
  - aarch64
  - amd64
startup: application
hassio_api: true
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:television-play
panel_title: Video Podcasts
map:
  - share:rw
  - media:rw
options:
  ha_url: "http://homeassistant:8123"
  ha_token: ""
  refresh_interval: 3600
  media_path: "/media/podcasts"
  feeds:
    - name: "The Delingpod"
      url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCur6nu-T7FilkEztCm_S8yA"
schema:
  ha_url: str
  ha_token: str
  refresh_interval: int
  media_path: str?
  feeds:
    - name: str
      url: str
      method: list(rss|ytdlp)?
