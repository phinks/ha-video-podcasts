name: "Video Podcasts"
version: "1.0.0"
slug: "video_podcasts"
description: >
  Aggregates video podcast RSS feeds and plays episodes on HA media player devices.
arch:
  - aarch64
  - amd64
startup: application
ingress: true
ingress_port: 8099
panel_icon: mdi:television-play
panel_title: Video Podcasts
map:
  - share:rw
options:
  ha_url: "http://homeassistant:8123"
  ha_token: ""
  refresh_interval: 3600
  feeds: []
schema:
  ha_url: str
  ha_token: str
  refresh_interval: int
  feeds:
    - url: str
      name: str?
